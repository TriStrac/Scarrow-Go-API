events {
    worker_connections 1024;
}

http {
    # Logging configuration
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Map the proxy headers so backend apps know the real client IP (passed from Cloudflare -> cloudflared -> Nginx)
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_addrs;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {
        # Listen on port 80 (This maps to Windows Host Port 80)
        listen 80;
        server_name localhost;

        # Route all traffic to the Go API container
        location / {
            # "api" is the hostname of the Go container defined in docker-compose.yml
            proxy_pass http://api:8080;
        }

        # You can easily add more apps later like this:
        # location /dashboard {
        #     proxy_pass http://dashboard-container:3000;
        # }
    }
}