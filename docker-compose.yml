version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: scarrow_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_ALLOW_EMPTY_PASSWORD: ${MYSQL_ALLOW_EMPTY_PASSWORD:-yes}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "43306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - scarrow_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  api:
    build: .
    container_name: scarrow_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - scarrow_net
      - gateway_net

networks:
  scarrow_net:
    driver: bridge
  gateway_net:
    external: true

volumes:
  db_data: